name: LockinFocus
options:
  bundleIdPrefix: com.moonkj
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  xcodeVersion: "15.0"

packages:
  ViewInspector:
    url: https://github.com/nalexn/ViewInspector
    from: 0.10.0

settings:
  base:
    DEVELOPMENT_TEAM: "QN975MTM7H"
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

targets:
  LockinFocus:
    type: application
    platform: iOS
    sources:
      - path: LockinFocus
    dependencies:
      - target: DeviceActivityMonitorExtension
      - target: ShieldConfigurationExtension
      - target: ShieldActionExtension
      - target: LockinFocusWidgets
    configFiles:
      Debug: Build.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moonkj.LockinFocus
        PRODUCT_NAME: LockinFocus
        CODE_SIGN_ENTITLEMENTS: LockinFocus/LockinFocus.entitlements
        INFOPLIST_FILE: LockinFocus/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MACCATALYST: "NO"

  DeviceActivityMonitorExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: DeviceActivityMonitorExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moonkj.LockinFocus.DeviceActivityMonitorExtension
        PRODUCT_NAME: DeviceActivityMonitorExtension
        CODE_SIGN_ENTITLEMENTS: DeviceActivityMonitorExtension/DeviceActivityMonitorExtension.entitlements
        INFOPLIST_FILE: DeviceActivityMonitorExtension/Info.plist
        SKIP_INSTALL: "YES"

  ShieldConfigurationExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShieldConfigurationExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moonkj.LockinFocus.ShieldConfigurationExtension
        PRODUCT_NAME: ShieldConfigurationExtension
        CODE_SIGN_ENTITLEMENTS: ShieldConfigurationExtension/ShieldConfigurationExtension.entitlements
        INFOPLIST_FILE: ShieldConfigurationExtension/Info.plist
        SKIP_INSTALL: "YES"

  ShieldActionExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShieldActionExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moonkj.LockinFocus.ShieldActionExtension
        PRODUCT_NAME: ShieldActionExtension
        CODE_SIGN_ENTITLEMENTS: ShieldActionExtension/ShieldActionExtension.entitlements
        INFOPLIST_FILE: ShieldActionExtension/Info.plist
        SKIP_INSTALL: "YES"

  LockinFocusWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: LockinFocusWidgets
      - path: LockinFocus/Core/Models/TreeStage.swift
      - path: LockinFocus/Core/Models/DailyQuote.swift
      - path: LockinFocus/Core/Models/DailyFocus.swift
      - path: LockinFocus/Core/Theme/AppColors.swift
      - path: LockinFocus/Core/Resources/QuoteProvider.swift
      - path: LockinFocus/Core/Shared/AppGroup.swift
      - path: LockinFocus/Core/Persistence/PersistenceKeys.swift
      - path: LockinFocus/Resources/Quotes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moonkj.LockinFocus.LockinFocusWidgets
        PRODUCT_NAME: LockinFocusWidgets
        CODE_SIGN_ENTITLEMENTS: LockinFocusWidgets/LockinFocusWidgets.entitlements
        INFOPLIST_FILE: LockinFocusWidgets/Info.plist
        SKIP_INSTALL: "YES"

  LockinFocusTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LockinFocusTests
    dependencies:
      - target: LockinFocus
      - package: ViewInspector
    configFiles:
      Debug: Build.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moonkj.LockinFocusTests
        INFOPLIST_FILE: LockinFocusTests/Info.plist
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/LockinFocus.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/LockinFocus
        GENERATE_INFOPLIST_FILE: "NO"

schemes:
  LockinFocus:
    build:
      targets:
        LockinFocus: all
        LockinFocusTests: [test]
    test:
      targets:
        - LockinFocusTests
    run:
      config: Debug
